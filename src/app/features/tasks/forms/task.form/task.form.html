<form [formGroup]="taskForm" (ngSubmit)="handleSubmit()" class="grid grid-cols-1 gap-4 py-2">
  <p-floatlabel variant="on">
    <input type="text" id="name" pInputText formControlName="name" fluid />
    <label for="name">Nombre</label>
  </p-floatlabel>
  <p-floatlabel variant="on">
    <textarea
      id="description"
      pInputTextarea
      formControlName="description"
      fluid
      rows="5"
    ></textarea>
    <label for="description">Descripción</label>
  </p-floatlabel>
  <p-floatlabel variant="on">
    <p-select
      [options]="priorityOptions"
      optionLabel="label"
      optionValue="value"
      formControlName="priority"
      appendTo="body"
      fluid
    />
    <label for="priority">Prioridad</label>
  </p-floatlabel>
  <div class="flex items-center justify-end gap-2">
    <p-button label="Cancelar" text severity="secondary" (onClick)="handleCancelled()" />
    <p-button [label]="!isEdit() ? 'Crear tarea' : 'Editar tarea'" type="submit" [disabled]="taskForm.invalid" />
  </div>
</form>
