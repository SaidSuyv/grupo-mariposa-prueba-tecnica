<p-button label="Crear nueva tarea" icon="pi pi-plus" (onClick)="showDialog()" fluid />

<p-dialog header="Nueva Tarea" [(visible)]="isDialogVisible" modal [draggable]="false" [resizable]="false"
    [style]="{ width: '25rem' }" [breakpoints]="{ '960px': '75vw' }" [closable]="false" [focusOnShow]="false">
    <app-task-form (onCanceled)="hideDialog()" (onSubmitted)="handleSubmit($event)"></app-task-form>
</p-dialog>
