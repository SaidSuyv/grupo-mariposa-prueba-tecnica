<p-dialog [(visible)]="isDialogVisible" modal [draggable]="false" [resizable]="false" [style]="{ width: '25rem' }"
    [breakpoints]="{ '960px': '75vw' }" [closable]="false" [focusOnShow]="false" appendTo="body">
    <ng-template #headless>
        <p-card>
            <div class="flex flex-col gap-4">
                <div class="flex items-center justify-between">
                    <h3 class="text-xl font-bold">{{ task().name }}</h3>
                    <div class="flex items-center gap-2">
                        <p-button icon="pi pi-pencil" severity="secondary" text rounded aria-label="Editar"
                            (onClick)="handleEdit()" />
                        <p-button icon="pi pi-trash" severity="danger" text rounded aria-label="Eliminar"
                            (onClick)="handleRemove()" />
                        <p-button icon="pi pi-times" severity="secondary" text rounded aria-label="Cerrar"
                            (onClick)="hideDialog()" />
                    </div>
                </div>
                <p>{{ task().description }}</p>
                <p-tag [value]="getPriorityTitle(task().priority)" [severity]="getPrioritySeverity(task().priority)" />
            </div>
        </p-card>
    </ng-template>
</p-dialog>
